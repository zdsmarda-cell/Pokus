<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Totemové Zvíře</title>
    
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/192/wolf.png" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/wolf.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Styles for the update notification */
      #update-toast {
        visibility: hidden;
        position: fixed;
        bottom: 24px;
        right: 24px;
        left: 24px;
        z-index: 50;
        transform: translateY(100px);
        transition: transform 0.3s ease-in-out, visibility 0.3s;
      }
      #update-toast.show {
        visibility: visible;
        transform: translateY(0);
      }
      @media (min-width: 640px) {
        #update-toast {
          left: auto;
          width: 24rem;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body class="bg-slate-900 text-white antialiased">
    <div id="root"></div>
    
    <!-- Update Notification UI -->
    <div id="update-toast">
      <div class="bg-slate-800 border border-emerald-500/50 rounded-xl shadow-2xl p-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="bg-emerald-500/20 p-2 rounded-full">
            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
          </div>
          <div>
            <p class="font-semibold text-white text-sm">Nová verze k dispozici</p>
            <p class="text-slate-400 text-xs">Aplikace byla aktualizována.</p>
          </div>
        </div>
        <button id="update-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
          Obnovit
        </button>
      </div>
    </div>

    <script>
      let newWorker;

      function showUpdateToast() {
        const toast = document.getElementById('update-toast');
        toast.classList.add('show');
      }

      document.getElementById('update-btn').addEventListener('click', () => {
        if (newWorker) {
          newWorker.postMessage({ type: 'SKIP_WAITING' });
        }
        // Hide toast
        document.getElementById('update-toast').classList.remove('show');
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then((registration) => {
            
            // 1. Check if there is already a waiting worker (update ready from previous visit)
            if (registration.waiting) {
              newWorker = registration.waiting;
              showUpdateToast();
            }

            // 2. Monitor for new updates found during this visit
            registration.addEventListener('updatefound', () => {
              newWorker = registration.installing;
              
              newWorker.addEventListener('statechange', () => {
                // Only show toast if the new worker is installed and we already have a controller (not first load)
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateToast();
                }
              });
            });

          }).catch((err) => {
            console.log('ServiceWorker registration failed: ', err);
          });

          // 3. Reload page when the new service worker takes control
          let refreshing;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            window.location.reload();
            refreshing = true;
          });
        });
      }
    </script>
  </body>
</html>
